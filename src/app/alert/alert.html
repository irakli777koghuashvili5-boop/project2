@if (alertService.alert$ | async; as alert) {

  @if (alert.open) {
    <div class="alertBody" (click)="closeAlert()">
      <div class="alertText" (click)="$event.stopPropagation()">

        <div class="alertTop">
          <h2>Alert</h2>
          <button class="alertClose" (click)="closeAlert()">×</button>
        </div>

        <div class="alertMiddle">
          <p>{{ alert.message }}</p>
        </div>

      </div>
    </div>
  }

}

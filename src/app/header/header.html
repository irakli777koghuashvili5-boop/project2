<header class="glass-header">
  <div class="nav-container">
    <a routerLink="/home" class="logo">Foodie</a>

    <nav class="desktop-nav">
      <a routerLink="/home" class="nav-link">Home</a>
      <a routerLink="/menu" class="nav-link">Menu</a>
    </nav>

    <div class="actions-group">
      <button routerLink="/cart" class="cart-btn" aria-label="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"></circle>
          <circle cx="20" cy="21" r="1"></circle>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
        </svg>
      </button>

      @if (isLoggedIn) {
        <div class="profile-wrapper">
          <button class="profile-btn" (click)="toggleProfileMenu()">
            <i class="fa-solid fa-user"></i> 
          </button>

          @if (isProfileMenuOpen) {
            <div class="profile-dropdown">
              <div class="dropdown-header">Hello: Vinme</div>
              <a routerLink="/profile" class="dropdown-item" (click)="closeProfileMenu()">Profile</a>
              <button (click)="logOut()" class="dropdown-item">Logout</button>
            </div>
          }
        </div>
      } @else {
        <button routerLink="/log-in" class="signup-btn">log in</button>
      }
    </div>

    <button class="hamburger-btn mobile-only" 
            [class.active]="isMenuOpen" 
            (click)="toggleMenu()" 
            aria-label="Toggle menu">
      <span class="line line-1"></span>
      <span class="line line-2"></span>
      <span class="line line-3"></span>
    </button>
  </div>

  <div class="mobile-menu-overlay" [class.open]="isMenuOpen">
    <nav class="mobile-nav">
      <a routerLink="/home" class="mobile-link" (click)="closeMenu()">Home</a>
      <a routerLink="/menu" class="mobile-link" (click)="closeMenu()">Menu</a>
      <hr class="divider">
    </nav>
  </div>
</header>

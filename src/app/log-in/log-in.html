<div class="auth-wrapper">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </header>

    <form class="auth-form" (ngSubmit)="SignIn()" >
      <div class="form-group">
        <label>Email</label>
        <input [(ngModel)]="email" name="email" type="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input [(ngModel)]="password" name="password" [type]="passAndInp == true ? 'text' : 'password'" placeholder="********">
          <button (click)="PassText()" type="button" class="view-btn">
            <i class="fa-regular fa-eye"></i>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a routerLink="/recover-passcode" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit"  class="primary-btn">Sign In</button>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <footer  class="auth-footer">
      Don't have an account? <a routerLink="/sign-up">Sign up</a>
    </footer>
  </div>
</div>

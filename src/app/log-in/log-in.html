<div class="auth-wrapper">
  <div class="auth-card">
    <header class="auth-header">
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </header>

    <form class="auth-form" #inForm="ngForm" (ngSubmit)="SignIn(inForm)" >
      <div class="form-group">
        <label>Email</label>
        <input  name="email" type="email" required ngModel placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <input  name="password" required ngModel [type]="passAndInp == true ? 'text' : 'password'" placeholder="********">
          <button (click)="PassText()" type="button" class="view-btn">
             <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox-container">
          <input type="checkbox">
          <span class="checkmark"></span>
          Remember me
        </label>
        <a routerLink="/recover-passcode" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" [disabled]="inForm.invalid"  class="primary-btn">Sign In</button>
    </form>

    <div class="divider">
      <span>or</span>
    </div>

    <footer  class="auth-footer">
      Don't have an account? <a routerLink="/sign-up">Sign up</a>
    </footer>
  </div>
</div>
